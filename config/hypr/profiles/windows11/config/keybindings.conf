# Windows 11 profile keybindings
# This file is intentionally independent from the original Quickshell shell.

# Mouse window management
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

# Bare Windows key opens Start
bindr = SUPER, Super_L, exec, $HOME/.local/bin/windows-start-menu

# Window controls
bind = ALT, F4, killactive
bind = SUPER, left, exec, $HOME/.local/bin/windows-snap left
bind = SUPER, right, exec, $HOME/.local/bin/windows-snap right
bind = SUPER, up, fullscreen, 1
bind = SUPER, down, fullscreen, 1
bind = SUPER, F, exec, $HOME/.local/bin/windows-fullscreen-toggle
bind = SUPER SHIFT, F, togglefloating
binde = SUPER SHIFT, left, resizeactive, -40 0
binde = SUPER SHIFT, right, resizeactive, 40 0
binde = SUPER SHIFT, up, resizeactive, 0 -40
binde = SUPER SHIFT, down, resizeactive, 0 40

# Windows-like shortcuts
bind = SUPER, TAB, exec, rofi -show window
bind = SUPER, E, exec, thunar
bind = SUPER, RETURN, exec, kitty
bind = SUPER, D, togglespecialworkspace, desktop
bind = SUPER, L, exec, hyprlock --config $HOME/.config/hypr/hyprlock-windows.conf

# Workspaces
bind = SUPER, mouse_down, exec, $HOME/.local/bin/windows-workspace-cycle previous
bind = SUPER, mouse_up, exec, $HOME/.local/bin/windows-workspace-cycle next
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9
bind = SUPER SHIFT, 0, movetoworkspace, 10

# Screenshots and hardware keys
bindl = SUPER SHIFT, S, exec, $HOME/.local/bin/windows-screenshot
bindl = , Print, exec, $HOME/.local/bin/windows-screenshot
bindl = SHIFT, Print, exec, $HOME/.local/bin/windows-screenshot --edit
bindl = , XF86MonBrightnessDown, exec, swayosd-client --brightness lower
bindl = , XF86MonBrightnessUp, exec, swayosd-client --brightness raise
bindl = , XF86AudioMicMute, exec, swayosd-client --input-volume mute-toggle
bindl = , XF86AudioMute, exec, swayosd-client --output-volume mute-toggle
bindel = , XF86AudioLowerVolume, exec, swayosd-client --output-volume lower
bindel = , XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPause, exec, playerctl play-pause
