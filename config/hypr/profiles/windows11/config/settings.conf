#  ◈ SETTINGS (AUTOGENERATED FROM SETTINGS.JSON)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

general {
    border_size = 1
    gaps_in = 4
    gaps_out = 4
    float_gaps = 0
    resize_on_border = true
    extend_border_grab_area = 30
    col.active_border=$active_border
    col.inactive_border=$inactive_border
}

decoration {
    rounding = 8
    active_opacity = 1.0
    inactive_opacity = 1.0
    blur {
        enabled = true
        size = 5
        passes = 1
        new_optimizations = true
    }
    shadow {
        enabled = true
        range = 18
        render_power = 3
        color = rgba(00000066)
    }
}

input {
    kb_layout = us,il
    kb_options = grp:alt_shift_toggle
    accel_profile = flat
    force_no_accel = true

    touchpad {
        natural_scroll = true
    }
}

cursor {
    no_warps = true
    no_hardware_cursors = true
}

binds {
    scroll_event_delay = 100
}

misc {
    font_family = JetBrains Mono
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
}

ecosystem {
    no_update_news = true
    no_donation_nag = true
}

animations {
    enabled = yes
    workspace_wraparound = true
    bezier = fluentOut, 0.16, 1, 0.3, 1
    bezier = fluentIn, 0.7, 0, 0.84, 0
    bezier = spring, 0.12, 0.92, 0.18, 1.18
    bezier = workspaceFlow, 0.22, 1, 0.36, 1
    animation = windowsIn, 1, 4, spring, popin 86%
    animation = windowsOut, 1, 3, fluentIn, popin 90%
    animation = windowsMove, 1, 4, fluentOut
    animation = border, 1, 7, fluentOut
    animation = fadeIn, 1, 3, fluentOut
    animation = fadeOut, 1, 3, fluentIn
    animation = fadeSwitch, 1, 4, fluentOut
    animation = layersIn, 1, 4, spring, slide bottom
    animation = layersOut, 1, 3, fluentIn, slide bottom
    animation = workspaces, 1, 4, workspaceFlow, slide
    animation = specialWorkspaceIn, 1, 4, spring, slidevert
    animation = specialWorkspaceOut, 1, 3, fluentIn, slidevert
}
