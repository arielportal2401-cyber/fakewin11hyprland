#  ◈ SETTINGS (AUTOGENERATED FROM SETTINGS.JSON)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

general {
    border_size = 1
    gaps_in = 4
    gaps_out = 4
    float_gaps = 0
    resize_on_border = true
    extend_border_grab_area = 30
    col.active_border=$active_border
    col.inactive_border=$inactive_border
}

decoration {
    rounding = 8
    active_opacity = 1.0
    inactive_opacity = 1.0
    blur {
        enabled = true
        size = 8
        passes = 2
        new_optimizations = true
    }
    shadow {
        enabled = true
        range = 18
        render_power = 3
        color = rgba(00000066)
    }
}

input {
    kb_layout = us,il
    kb_options = grp:alt_shift_toggle
    accel_profile = flat
    force_no_accel = true

    touchpad {
        natural_scroll = true
    }
}

cursor {
    no_warps = true
    no_hardware_cursors = true
}

binds {
    scroll_event_delay = 100
}

misc {
    font_family = JetBrains Mono
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
}

ecosystem {
    no_update_news = true
    no_donation_nag = true
}

animations {
    enabled = yes
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 5, myBezier, popin 80%
    animation = windowsOut, 1, 5, myBezier, popin 80%
    animation = layers, 1, 5, myBezier, fade
    animation = layersIn, 1, 5, myBezier, fade
    animation = layersOut, 1, 5, myBezier, fade
    animation = fade, 1, 5, myBezier
    animation = workspaces, 1, 5, myBezier, slide
    animation = specialWorkspaceIn, 1, 5, myBezier, fade
    animation = specialWorkspaceOut, 1, 5, myBezier, fade
}
