# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  ◈ WINDOW & LAYER RULES
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

layerrule {
    name = "lr1"
    match:namespace = ^(volume_osd)$
    no_anim = on
}

layerrule {
    name = "lr2"
    match:namespace = ^(brightness_osd)$
    no_anim = on
}

layerrule {
    name = "lr3"
    match:namespace = hyprpicker
    no_anim = on
}

layerrule {
    name = "lr4"
    match:namespace = qsdock
    no_anim = on
}

layerrule {
    name = "lr5"
    match:namespace = ext-session-lock
    blur = on
    ignore_alpha = 0.2
}

layerrule {
    name = "windows_taskbar_material"
    match:namespace = ^(windows-taskbar)$
    blur = on
    ignore_alpha = 0.18
}

layerrule {
    name = "windows_start_material"
    match:namespace = ^(windows-start)$
    blur = on
    ignore_alpha = 0.18
}

layerrule {
    name = "windows_quick_settings_material"
    match:namespace = ^(windows-quick-settings)$
    blur = on
    ignore_alpha = 0.18
}

layerrule {
    name = "windows_calendar_material"
    match:namespace = ^(windows-calendar)$
    blur = on
    ignore_alpha = 0.18
}

layerrule {
    name = "windows_native_flyouts"
    match:namespace = ^(windows-notifications|windows-power|windows-tray)$
    blur = on
    ignore_alpha = 0.18
}

# ─────────────────────────────
# Window rules
# ─────────────────────────────

# Windows-style desktop mode: ordinary application windows overlap and retain
# their chosen size instead of being inserted into a tiling layout.
windowrule {
    name = "windows_floating_desktop"
    match:class = .+
    float = on
}


# Spiral mode temporarily enables this rule so the previously focused window
# remains the insertion target. The layout watcher focuses the new client as
# soon as Hyprland has placed it.
windowrule {
    name = "spiral_split_focus"
    match:class = .+
    no_initial_focus = on
}

# ───────── App Launcher ─────────
windowrule {
    name = "app_launcher"
    match:title = ^(app-launcher)$
    float = on
    center = on
    size = 1200 600
    animation = slide
}

# Personalization's file and color choosers behave like Windows system dialogs:
# float above application windows, stay centered, and follow every workspace.
windowrule {
    name = "windows_system_dialogs"
    match:title = ^(Choose a (Start|Search|Task View) icon|Choose a wallpaper|Taskbar background|Accent color)$
    float = on
    center = on
    pin = on
    stay_focused = on
    animation = popin 88%
}

windowrule {
    name = "windows_portal_file_chooser"
    match:class = ^(xdg-desktop-portal-gtk|org\.freedesktop\.impl\.portal\.desktop\.gtk)$
    float = on
    center = on
    pin = on
    stay_focused = on
    animation = popin 88%
}

# ───────── MASTER QUICKSHELL CONTAINER ─────────
windowrule {
    name = "master_rule"
    match:title = ^(qs-master)$
    float = on
    no_shadow = on
    no_initial_focus = on
}
