general {
    hide_cursor = true
    grace = 0
}
background {
    monitor =
    path = @HOME@/.local/share/windows11/wallpapers/windows-dark.jpg
    blur_passes = 3
    blur_size = 7
    brightness = 0.55
}
label {
    monitor =
    text = cmd[update:1000] date +"%H:%M"
    color = rgba(255,255,255,1)
    font_size = 82
    position = 0, 180
    halign = center
    valign = center
}
label {
    monitor =
    text = cmd[update:0] whoami
    color = rgba(255,255,255,1)
    font_size = 18
    position = 0, -45
    halign = center
    valign = center
}
input-field {
    monitor =
    size = 310, 44
    position = 0, -105
    halign = center
    valign = center
    outline_thickness = 1
    outer_color = rgba(255,255,255,0.42)
    inner_color = rgba(25,30,38,0.88)
    font_color = rgba(255,255,255,1)
    placeholder_text = Password
    fail_text = Incorrect password
    rounding = 4
}
