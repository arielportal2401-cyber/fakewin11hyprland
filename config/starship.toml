format = """
[ŅéČ](fg:blue)\
$os\
$username\
[Ņé░](fg:blue bg:navy)\
$directory\
[Ņé░](fg:navy bg:slate)\
$git_branch\
$git_status\
[Ņé░](fg:slate)\
$fill\
$cmd_duration\
$status\
$line_break\
$character"""
palette = "windows11"
add_newline = true
command_timeout = 800

[palettes.windows11]
blue = "#60CDFF"
navy = "#17365D"
slate = "#26384D"
text = "#E7EEF8"
muted = "#8FA1B5"
green = "#6CCB8E"
red = "#FF7B86"
yellow = "#F3C96B"

[os]
disabled = false
style = "bg:blue fg:#071018 bold"
format = "[$symbol]($style)"
[os.symbols]
Linux = " ’ģ╝ "
[username]
show_always = true
style_user = "bg:blue fg:#071018 bold"
format = "[$user ]($style)"
[directory]
style = "bg:navy fg:text bold"
format = "[ ’ü╝  $path ]($style)"
truncation_length = 3
truncate_to_repo = false
[git_branch]
symbol = "’Éś"
style = "bg:slate fg:text"
format = "[ $symbol $branch]($style)"
[git_status]
style = "bg:slate fg:yellow"
format = "[$all_status$ahead_behind ]($style)"
[fill]
symbol = " "
[cmd_duration]
min_time = 500
style = "fg:muted"
format = "[¾▒Ä½ $duration ]($style)"
[status]
disabled = false
style = "fg:red bold"
format = "[$symbol$status ]($style)"
[character]
success_symbol = "[ŌØ»](bold green)"
error_symbol = "[ŌØ»](bold red)"
vimcmd_symbol = "[ŌØ«](bold blue)"
